name: Check Upstream Image

on:
  schedule:
    - cron: "0 */4 * * *"   # at :00 of every 4th hour (00:00, 04:00, 08:00, ...)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write       # needed to trigger the build workflow

    steps:
      - name: Get current digest of bluefin:latest
        id: current
        run: |
          DIGEST=$(skopeo inspect --format '{{.Digest}}' \
            docker://ghcr.io/ublue-os/bluefin:latest)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Restore last known digest from cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: last-digest.txt
          # restore-keys finds the most recent cache with this prefix,
          # regardless of the suffix (i.e., regardless of old digest value)
          restore-keys: bluefin-latest-digest-
          key: bluefin-latest-digest-${{ steps.current.outputs.digest }}

      - name: Compare digests
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.digest }}"
          LAST=""
          [ -f last-digest.txt ] && LAST=$(cat last-digest.txt)

          echo "Current : $CURRENT"
          echo "Last    : $LAST"

          if [ "$CURRENT" != "$LAST" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "$CURRENT" > last-digest.txt
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save new digest to cache
        if: steps.compare.outputs.changed == 'true'
        uses: actions/cache/save@v5
        with:
          path: last-digest.txt
          key: bluefin-latest-digest-${{ steps.current.outputs.digest }}

      - name: Trigger build workflow
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "Upstream image changed — triggering build"
          gh workflow run bluebuild.yml --repo "$GITHUB_REPOSITORY" --ref "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
